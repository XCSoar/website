---
permalink: /discover/:year/:month/:day/:title.html

# Canonical URLs, sitemap.xml, and robots.txt Sitemap line (use https in production builds).
url: "https://xcsoar.org"

# Default meta description when a page has no `description` front matter.
description: "Open-source tactical glide computer for soaring and paragliding pilots — maps, tasks, METAR, and more."

title: XCSoar
# Default Open Graph / Twitter image (absolute URL built with absolute_url filter).
og_image: /android-chrome-512x512.png

xcsoar_stable_version: 7.44
xcsoar_testing_version: null
xcsoar_old_version: 7.43

server_url: ''
absolute_server_url: '//xcsoar.org'
download_server_url: 'https://download.xcsoar.org/releases'
# Release tree folder for desktop Linux/Unix packages (7.44+ uses UNIX/; older stables used DEBIAN/)
xcsoar_linux_download_subdir: UNIX
xcsoar_old_linux_download_subdir: DEBIAN
github_issues_url: 'https://github.com/XCSoar/XCSoar/issues'
mapgen_url: 'https://mapgen.xcsoar.org/'
download_fdroid_url: 'https://f-droid.org/packages/org.xcsoar/'
# Google Play package id; phone screenshots for /discover/screenshots/ sync from XCSoar/XCSoar Fastlane:
# https://github.com/XCSoar/XCSoar/tree/master/fastlane/metadata/android
# https://github.com/XCSoar/XCSoar/blob/master/fastlane/README.md
download_android_google_play_package_id: org.xcsoar.play
download_app_store_url: 'https://apps.apple.com/app/xcsoar/id6741046464'

plugins:
  - jekyll/minibundle
  - jekyll-sitemap

# Maintainer notes under docs/internal/ are not part of the public site.
exclude:
  - docs/internal
  - scripts
