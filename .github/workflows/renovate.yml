---
# Runs Renovate on a schedule (self-hosted). If you also use the Mend Renovate GitHub App,
# disable one to avoid duplicate PRs.
# Optional: add repo secret RENOVATE_TOKEN (fine-grained PAT: contents, issues, pull-requests,
# workflows) so normal CI runs on Renovate PRs; otherwise github.token is used.
name: Renovate

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  workflows: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || github.token }}
