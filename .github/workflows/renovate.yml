---
# Runs Renovate on a schedule (self-hosted). If you also use the Mend Renovate GitHub App,
# disable one to avoid duplicate PRs.
# Optional: add repo secret RENOVATE_TOKEN (fine-grained PAT: contents, issues, pull-requests,
# workflows) so normal CI runs on Renovate PRs; otherwise github.token is used.
name: Renovate

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  workflows: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || github.token }}
