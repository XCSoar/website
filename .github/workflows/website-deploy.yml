---
on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.5
          bundler-cache: true
      - name: install dependencies
        run: |
          sudo apt-get install \
            yui-compressor \
            rsync
      - name: sync Fastlane Play Store text and phone screenshots from XCSoar/XCSoar
        run: ruby scripts/sync_google_play_metadata.rb
      - name: build website
        run: bundle exec jekyll build --future
      - name: rsync deployments
        uses: burnett01/rsync-deployments@4d419d1dc46d4a8a2b6ceab2f951f0f93b2da8f5 # v9
        with:
          switches: -rv --delete
          path: _site/
          remote_path: /var/wwwusers/www.xcsoar.org/public_html/
          remote_host: www.xcsoar.org
          remote_user: website
          remote_key: ${{ secrets.DEPLOY_KEY }}
        if: github.ref == 'refs/heads/master'
