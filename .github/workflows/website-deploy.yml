---
on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.3
          bundler-cache: true
      - name: install dependencies
        run: |
          sudo apt-get install \
            yui-compressor \
            librsvg2-bin \
            rsync
      - name: sync Fastlane Play Store text and phone screenshots from XCSoar/XCSoar
        run: ruby scripts/sync_google_play_metadata.rb
      - name: build website
        run: bundle exec jekyll build --future
      - name: rsync deployments
        uses: burnett01/rsync-deployments@0dc935cdecc5f5e571865e60d2a6cdc673704823 # 5.2
        with:
          switches: -rv --delete
          path: _site/
          remote_path: /var/wwwusers/www.xcsoar.org/public_html/
          remote_host: www.xcsoar.org
          remote_user: website
          remote_key: ${{ secrets.DEPLOY_KEY }}
        if: github.ref == 'refs/heads/master'
